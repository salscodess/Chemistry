<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-running {
            background-color: #10b981;
        }

        .status-stopped {
            background-color: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #1e293b;
            font-size: 18px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: #10b981;
            color: white;
        }

        .btn-start:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-stop {
            background: #ef4444;
            color: white;
        }

        .btn-stop:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn-restart {
            background: #f59e0b;
            color: white;
        }

        .btn-restart:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .btn-refresh {
            background: #667eea;
            color: white;
        }

        .btn-refresh:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .terminal {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #00ff00;
            line-height: 1.6;
        }

        .terminal::-webkit-scrollbar {
            width: 8px;
        }

        .terminal::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .terminal::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .terminal-line {
            margin-bottom: 4px;
        }

        .command-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .command-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .command-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .command-input button {
            padding: 12px 24px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .ws-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ws-connected {
            background: #d1fae5;
            color: #065f46;
        }

        .ws-disconnected {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.4);
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Chemistry API Dashboard</h1>
            <p class="subtitle">Server Management & Monitoring - dash.salsoftware.online</p>
        </header>

        <div id="alert" class="alert"></div>

        <div class="grid">
            <div class="card">
                <h2>Server Controls</h2>
                <div class="btn-group">
                    <button class="btn-start" onclick="startServer()">▶ Start</button>
                    <button class="btn-stop" onclick="stopServer()">■ Stop</button>
                    <button class="btn-restart" onclick="restartServer()">↻ Restart</button>
                    <button class="btn-refresh" onclick="refreshStatus()">⟳ Refresh</button>
                </div>
                <div id="server-status">
                    <p><strong>Status:</strong> <span class="status-indicator status-stopped"></span><span id="status-text">Stopped</span></p>
                </div>
            </div>

            <div class="card">
                <h2>Process Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">PID</div>
                        <div class="info-value" id="pid">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">CPU Usage</div>
                        <div class="info-value" id="cpu">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Memory</div>
                        <div class="info-value" id="memory">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Uptime</div>
                        <div class="info-value" id="uptime">-</div>
                    </div>
                </div>
            </div>

            <div class="card full-width">
                <h2>Dashboard Settings</h2>
                <div class="btn-group">
                    <button class="btn-warning" onclick="showPasswordModal()">🔑 Change Password</button>
                    <button class="btn-warning" onclick="restartDashboard()">🔄 Restart Dashboard</button>
                </div>
            </div>

            <div class="card full-width">
                <h2>Live Terminal <span class="ws-status ws-disconnected" id="ws-status">Disconnected</span></h2>
                <div class="terminal" id="terminal">
                    <div class="terminal-line">Waiting for connection...</div>
                </div>
                <div class="command-input">
                    <input type="text" id="command" placeholder="Enter custom command (e.g., pip list, ls -la)" onkeypress="handleCommandKeyPress(event)">
                    <button class="btn-refresh" onclick="executeCommand()">Execute</button>
                    <button class="btn-stop" onclick="clearTerminal()">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Change Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>Change Password</h3>
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min 8 chars)">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closePasswordModal()">Cancel</button>
                <button class="btn-warning" onclick="changePassword()">Change Password</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;

        // Determine WebSocket URL based on current location
        function getWebSocketUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${protocol}//${window.location.host}/ws`;
        }

        // Connect to WebSocket
        function connectWebSocket() {
            try {
                ws = new WebSocket(getWebSocketUrl());
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    document.getElementById('ws-status').textContent = 'Connected';
                    document.getElementById('ws-status').className = 'ws-status ws-connected';
                    
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'log') {
                        appendToTerminal(data.data);
                    } else if (data.type === 'history') {
                        const terminal = document.getElementById('terminal');
                        terminal.innerHTML = '';
                        data.data.forEach(line => appendToTerminal(line));
                    }
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    document.getElementById('ws-status').textContent = 'Disconnected';
                    document.getElementById('ws-status').className = 'ws-status ws-disconnected';
                    
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(() => {
                            console.log('Attempting to reconnect...');
                            connectWebSocket();
                        }, 5000);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
            } catch (error) {
                console.error('Failed to connect WebSocket:', error);
            }
        }

        function appendToTerminal(text) {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('terminal').innerHTML = '';
        }

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }

        async function startServer() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Server started successfully', 'success');
                    setTimeout(refreshStatus, 1000);
                } else {
                    showAlert(data.detail || 'Failed to start server', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function stopServer() {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Server stopped successfully', 'success');
                    setTimeout(refreshStatus, 1000);
                } else {
                    showAlert(data.detail || 'Failed to stop server', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function restartServer() {
            try {
                const response = await fetch('/api/restart', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Server restarting...', 'success');
                    setTimeout(refreshStatus, 2000);
                } else {
                    showAlert(data.detail || 'Failed to restart server', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusText = document.getElementById('status-text');
                const statusIndicator = document.querySelector('.status-indicator');
                
                statusText.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);
                statusIndicator.className = `status-indicator status-${data.status}`;
                
                if (data.process) {
                    document.getElementById('pid').textContent = data.process.pid;
                    document.getElementById('cpu').textContent = data.process.cpu_percent.toFixed(1) + '%';
                    document.getElementById('memory').textContent = data.process.memory_mb.toFixed(1) + ' MB';
                    
                    const startTime = new Date(data.process.started_at);
                    const uptime = Math.floor((Date.now() - startTime) / 1000);
                    const hours = Math.floor(uptime / 3600);
                    const minutes = Math.floor((uptime % 3600) / 60);
                    document.getElementById('uptime').textContent = `${hours}h ${minutes}m`;
                } else {
                    document.getElementById('pid').textContent = '-';
                    document.getElementById('cpu').textContent = '-';
                    document.getElementById('memory').textContent = '-';
                    document.getElementById('uptime').textContent = '-';
                }
            } catch (error) {
                console.error('Failed to refresh status:', error);
            }
        }

        async function executeCommand() {
            const commandInput = document.getElementById('command');
            const command = commandInput.value.trim();
            
            if (!command) return;
            
            appendToTerminal(`$ ${command}`);
            commandInput.value = '';
            
            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                
                const data = await response.json();
                
                if (data.stdout) {
                    data.stdout.split('\n').forEach(line => {
                        if (line) appendToTerminal(line);
                    });
                }
                
                if (data.stderr) {
                    data.stderr.split('\n').forEach(line => {
                        if (line) appendToTerminal(`ERROR: ${line}`);
                    });
                }
                
                if (!response.ok) {
                    appendToTerminal(`Command failed with code ${data.returncode}`);
                }
            } catch (error) {
                appendToTerminal(`ERROR: ${error.message}`);
            }
        }

        function handleCommandKeyPress(event) {
            if (event.key === 'Enter') {
                executeCommand();
            }
        }

        function showPasswordModal() {
            document.getElementById('passwordModal').classList.add('show');
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!currentPassword || !newPassword || !confirmPassword) {
                showAlert('All password fields are required', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('New passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters', 'error');
                return;
            }

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password changed successfully! Please restart dashboard.', 'success');
                    closePasswordModal();
                } else {
                    showAlert(data.detail || 'Failed to change password', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function restartDashboard() {
            if (!confirm('Are you sure you want to restart the dashboard? You will be disconnected.')) {
                return;
            }

            try {
                const response = await fetch('/api/restart-dashboard', { method: 'POST' });
                const data = await response.json();

                if (response.ok) {
                    showAlert('Dashboard is restarting... Page will reload in 5 seconds.', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 5000);
                } else {
                    showAlert(data.detail || 'Failed to restart dashboard', 'error');
                }
            } catch (error) {
                // Expected error when dashboard restarts
                showAlert('Dashboard restarting... Page will reload in 5 seconds.', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 5000);
            }
        }

        // Initialize
        connectWebSocket();
        refreshStatus();
        setInterval(refreshStatus, 5000); // Auto-refresh every 5 seconds
    </script>
</body>
</html>
